<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Gnokz Info</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #050a15;
      --panel-bg: rgba(10, 18, 36, 0.6);
      --border-glow: rgba(168, 85, 247, 0.4);
      --glass-border: rgba(255, 255, 255, 0.12);
      --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 50%, #0d1527, var(--bg-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow: hidden;
      position: relative;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.4;
      pointer-events: none;
    }
    .orb-1 {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.3), transparent 70%);
      top: 20%;
      left: 15%;
    }
    .orb-2 {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.25), transparent 70%);
      bottom: 20%;
      right: 15%;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.15);
      border-radius: 1.25rem;
      z-index: 10;
      width: 100%;
    }

    /* LOGIN CARD */
    .login-card {
      max-width: 350px;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    .login-card h2 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sub-message {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.8rem;
      margin-bottom: 1.5rem;
      border-left: 2px solid #a855f7;
      padding-left: 8px;
    }

    .input-group {
      position: relative;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s;
    }

    .input-group:focus-within {
      border-color: #a855f7;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.2);
    }

    .input-group i:first-child {
      padding-left: 1rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .input-group input {
      background: transparent;
      border: none;
      padding: 0.75rem;
      width: 100%;
      font-size: 0.9rem;
      color: #ffffff;
      outline: none;
    }

    .toggle-password {
      position: absolute;
      right: 1rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.4);
    }

    .continue-btn {
      width: 100%;
      background: var(--primary-gradient);
      border: none;
      padding: 0.8rem;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 0.6rem;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .error-message {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 0.6rem;
      border-radius: 0.5rem;
      text-align: center;
      color: #fca5a5;
    }

    .demo-hint {
      margin-top: 1.25rem;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
    }

    /* PRIVATE DASHBOARD & VIEWPORTS */
    .private-hub {
      max-width: 420px;
      display: none;
      z-index: 10;
    }

    .glass-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo-gnoks h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffffff;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-name {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 0.3rem 0.65rem;
      border-radius: 0.4rem;
      color: #fca5a5;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .gnoks-header {
      padding: 1.25rem 1rem 0.4rem 1rem;
    }

    .gnoks-header h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #ffffff;
    }

    .details-section {
      padding: 0 1rem 1rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .details-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.35);
    }

    .info-description {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 0.2rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.65rem;
      padding: 1rem;
    }

    .category-tile {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0.75rem;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.4rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
    }

    .tile-icon {
      width: 30px;
      height: 30px;
      background: rgba(168, 85, 247, 0.12);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #c084fc;
    }

    .tile-text {
      font-weight: 600;
      font-size: 0.85rem;
      color: #ffffff;
    }

    .tile-sub {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .private-footer {
      padding: 0.85rem;
      background: rgba(0, 0, 0, 0.15);
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);
      border-bottom-left-radius: 1.25rem;
      border-bottom-right-radius: 1.25rem;
    }

    /* FULLSCREEN PORTFOLIO STYLES */
    .portfolio-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .back-hub-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #ffffff;
      padding: 0.4rem 0.8rem;
      border-radius: 0.5rem;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 600;
    }

    .portfolio-tabs {
      display: flex;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      overflow-x: auto;
    }

    .tab-trigger {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.5);
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .tab-trigger.active {
      background: var(--primary-gradient);
      color: #ffffff;
      border-color: transparent;
    }

    .portfolio-feed {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      padding: 1rem;
      max-height: 62vh;
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    /* VIDEO PREVIEW CARD COMPONENT */
    .preview-card {
      background: #020617;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1rem;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .preview-card .card-title {
      font-size: 1.15rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #ffffff;
      margin-bottom: 0.6rem;
    }

    /* ASPECT RATIO VIDEO CONTAINER */
    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000000;
      border-radius: 0.6rem;
      overflow: hidden;
      transition: aspect-ratio 0.3s ease;
    }

    .video-wrapper.ratio-expanded {
      aspect-ratio: auto;
    }

    .video-wrapper video {
      width: 100%;
      display: block;
    }

    .video-wrapper:not(.ratio-expanded) video {
      height: 100%;
      object-fit: cover;
    }

    .expand-toggle-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      border-radius: 0.4rem;
      padding: 0.3rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      backdrop-filter: blur(4px);
    }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.75);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-container {
      max-width: 380px;
      transform: scale(0.92);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1rem;
      color: #ffffff;
    }

    .close-modal {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1rem;
      cursor: pointer;
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 1rem;
      max-height: 50vh;
      overflow-y: auto;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .option-card {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 0.6rem;
      padding: 0.7rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-main-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card-icon {
      font-size: 0.9rem;
      color: #c084fc;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.8rem;
      color: #ffffff;
    }

    .card-desc {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .card-action {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.3rem 0.66rem;
      border-radius: 0.4rem;
      color: #ffffff;
      font-weight: 500;
      font-size: 0.7rem;
      cursor: pointer;
    }

    .sub-versions-container {
      display: none;
      flex-direction: column;
      gap: 0.4rem;
      padding: 0.4rem 0 0.4rem 1rem;
      border-left: 2px solid rgba(168, 85, 247, 0.3);
      margin-top: 0.3rem;
      margin-bottom: 0.3rem;
    }

    .toggle-arrow {
      transition: transform 0.2s ease;
      color: rgba(255, 255, 255, 0.4);
    }

    .toast-alert {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translate(-50%, 10px);
      background: rgba(10, 15, 30, 0.9);
      border: 1px solid var(--border-glow);
      padding: 0.5rem 1.25rem;
      border-radius: 1.5rem;
      color: #ffffff;
      font-size: 0.75rem;
      z-index: 2000;
      opacity: 0;
      transition: all 0.22s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast-alert.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }
  </style>
</head>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<form id="loginForm" class="glass-panel login-card">

  <button type="submit" class="continue-btn">

<div id="portfolioApp" class="glass-panel private-hub">

<div id="modalOverlay" class="modal-overlay">

</div>

    function showToast(msg) {

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = usernameField.value.trim();
      const pass = passwordField.value;
      const hashedInput = await sha256(pass);

      if(user === 'Gnokz' && hashedInput === '4e43018e9d9c90ee405008cb83cd63f3efd6d6c8c6f06121a80bff5a2b4069bd'){

    function initVideoAutoplayObserver() {
      if (videoIntersectionObserver) {
        videoIntersectionObserver.disconnect();
      }

      const observerOptions = {
        root: portfolioFeedContainer,
        threshold: 0.6
      };

      videoIntersectionObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          if (entry.isIntersecting) {
            if (video.src) {
              video.play().catch(() => {});
            }
          } else {
            video.pause();
          }
        });
      }, observerOptions);

      const videos = portfolioFeedContainer.querySelectorAll('video');
      videos.forEach(v => videoIntersectionObserver.observe(v));
    }

    function buildPortfolioFeed(filterStyle) {
      portfolioFeedContainer.innerHTML = '';
      let cardCounter = 1;

      portfolioRepo.forEach(project => {
        if (project.type !== filterStyle) return;

        const card = document.createElement('div');
        card.className = 'preview-card';
        
        // REMOVED 'muted' ATTRIBUTE FOR UNMUTED AUDIO PLAYBACK
        card.innerHTML = `
          <div class="card-title">Preview ${cardCounter}</div>
          <div class="video-wrapper">
            <button type="button" class="expand-toggle-btn">
              <i class="fas fa-expand"></i> <span>Expand Ratio</span>
            </button>
            <video loop playsinline src="${project.videoSrc}"></video>
          </div>
        `;

        const videoWrapper = card.querySelector('.video-wrapper');
        const expandBtn = card.querySelector('.expand-toggle-btn');
        const expandIcon = expandBtn.querySelector('i');
        const expandText = expandBtn.querySelector('span');

        expandBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isExpanded = videoWrapper.classList.toggle('ratio-expanded');
          if (isExpanded) {
            expandIcon.className = 'fas fa-compress';
            expandText.innerText = 'Close Ratio';
          } else {
            expandIcon.className = 'fas fa-expand';
            expandText.innerText = 'Expand Ratio';
          }
        });

        portfolioFeedContainer.appendChild(card);
        cardCounter++;
      });

      initVideoAutoplayObserver();
    }

    function openModal(id) {

              } else {

              }
            });

            subContainer.appendChild(verEl);
          });

          cardEl.addEventListener('click', () => {
            const isHidden = subContainer.style.display !== 'flex';
            subContainer.style.display = isHidden ? 'flex' : 'none';
            cardEl.querySelector('.toggle-arrow').style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
          });

          cardWrapper.appendChild(cardEl);
          cardWrapper.appendChild(subContainer);
          modalCardsContainer.appendChild(cardWrapper);

        } else {
          cardEl.innerHTML = `
            <div class="card-main-info">
              <div class="card-icon"><i class="fas ${card.icon}"></i></div>
              <div>
                <div class="card-title">${card.title}</div>
                <div class="card-desc">${card.desc}</div>
              </div>
            </div>
            <button class="card-action">${card.actionLabel || 'GET'}</button>
          `;
          
          cardEl.querySelector('.card-action').addEventListener('click', () => {
            if (id === 'presets') {
              if (card.url && !card.url.includes('ILAGAY_ANG_DIRECT_LINK_DITO')) {
                showToast(`Downloading: ${card.title}...`);

              } else {
                showToast(`Wala pang link ang ${card.title}`);
              }
            } else if (id === 'research' || id === 'prompts') {
              fetch(card.filePath)
                .then(response => {
                  if (!response.ok) throw new Error('File not found');
                  return response.text();
                })
                .then(text => {
                  navigator.clipboard.writeText(text).then(() => {
                    showToast(`Copied prompt for ${card.title}!`);
                  }).catch(() => {
                    showToast('Failed to copy prompt.');

                })
                .catch(err => {
                  showToast(`Error: Hindi mahanap ang file.`);

                });
            } else {

          });
          modalCardsContainer.appendChild(cardEl);
        }
      });
