<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Reymark Delagao</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #050816;
      --bg-gradient: #0b1020;
      --panel-bg: rgba(11, 16, 32, 0.6);
      --accent-purple: #8b5cf6;
      --accent-indigo: #6366f1;
      --accent-cyan: #22d3ee;
      --glass-border: rgba(255, 255, 255, 0.08);
    }

    /* PREVENTS MOBILE GLITCH/OVERSCROLL WHITESPACE */
    html, body {
      overscroll-behavior: none;
      background-color: #050816;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% 30%, var(--bg-gradient) 0%, var(--bg-dark) 75%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow-x: hidden;
      position: relative;
    }

    /* ATMOSPHERIC CINEMATIC LIGHTING */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.05), transparent 60%);
      pointer-events: none;
      z-index: 1;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
      animation: ambientFloat 8s infinite ease-in-out;
    }
    .orb-1 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.2), transparent 70%);
      top: 10%;
      left: 10%;
    }
    .orb-2 {
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
      bottom: 10%;
      right: 10%;
      animation-delay: -4s;
    }

    @keyframes ambientFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    /* MAIN CORE PREMIUM CONTAINER */
    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), 
                  0 0 25px rgba(139, 92, 246, 0.08);
      z-index: 10;
      width: 100%;
    }

    /* CINEMATIC LAYERED LOGIN CARD */
    .login-card {
      max-width: 400px;
      border-radius: 28px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      animation: cardEntrance 0.65s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* BANNER SYSTEM */
    .banner-section {
      position: relative;
      height: 150px;
      background: linear-gradient(180deg, rgba(11, 16, 32, 0.3), rgba(5, 8, 22, 0.8));
      overflow: hidden;
    }
    .banner-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .banner-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(5, 8, 22, 0) 20%, var(--bg-dark) 100%);
    }

    /* IDENTITY & AVATAR LAYER */
    .profile-node-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: -48px;
      padding: 0 2.2rem 2.5rem 2.2rem;
      text-align: center;
    }

    .avatar-node-wrapper {
      position: relative;
      width: 96px;
      height: 96px;
      margin-bottom: 1.2rem;
    }
    .avatar-node-wrapper img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.35);
      background: #0b1020;
    }

    .live-status-dot {
      position: absolute;
      bottom: 4px;
      right: 4px;
      width: 12px;
      height: 12px;
      background-color: var(--accent-cyan);
      border-radius: 50%;
      border: 2px solid var(--bg-dark);
      box-shadow: 0 0 12px var(--accent-cyan);
    }

    .node-operator-name {
      font-size: 1.45rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.5px;
      margin-bottom: 0.35rem;
    }

    .node-meta-status {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.8px;
      color: rgba(163, 163, 198, 0.6);
      margin-bottom: 2.2rem;
    }

    /* INTERACTIVE CONTROL INPUTS */
    .input-wrapper-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      margin-bottom: 2.2rem;
    }

    .input-group {
      position: relative;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 0 1.1rem;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .input-group:focus-within {
      border-color: rgba(168, 85, 247, 0.8);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.18), 
                  inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .input-group i:first-child {
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.25s ease;
    }
    .input-group:focus-within i:first-child {
      color: var(--accent-cyan);
    }

    .input-group input {
      background: transparent;
      border: none;
      padding: 1.1rem 0.85rem;
      width: 100%;
      font-size: 0.92rem;
      color: #ffffff;
      outline: none;
    }
    .input-group input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .toggle-password {
      cursor: pointer;
      color: rgba(255, 255, 255, 0.35);
      transition: color 0.25s;
    }
    .toggle-password:hover {
      color: #ffffff;
    }

    /* ACTION ARCHITECTURE */
    .action-gate-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .continue-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-indigo), var(--accent-purple), #d946ef);
      border: none;
      padding: 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 14px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
    }
    .continue-btn:hover {
      transform: scale(1.015);
      filter: brightness(1.1);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.4), 
                  0 0 12px rgba(217, 70, 239, 0.2);
    }
    .continue-btn:active {
      transform: scale(0.99);
    }

    .visitor-btn {
      width: 100%;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.1rem;
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 14px;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .visitor-btn:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
    }

    .error-message {
      margin-top: 1rem;
      font-size: 0.8rem;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 0.8rem;
      border-radius: 10px;
      text-align: center;
      color: #fca5a5;
    }

    .demo-hint {
      margin-top: 1.8rem;
      text-align: center;
      font-size: 0.72rem;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.3);
    }

    /* INTERNAL APPS DESIGN INTEGRITY */
    .private-hub {
      max-width: 440px;
      border-radius: 24px;
      display: none;
      z-index: 10;
      overflow: hidden;
      animation: cardEntrance 0.5s ease forwards;
    }

    .glass-navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .logo-gnoks h2 {
      font-size: 1.05rem;
      font-weight: 700;
      color: #ffffff;
    }

    .user-area {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .user-name {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.85rem;
    }

    .logout-btn {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      color: #fca5a5;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .gnoks-header {
      padding: 1.5rem 1.5rem 0.5rem 1.5rem;
    }

    .gnoks-header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      color: #ffffff;
    }

    .details-section {
      padding: 0 1.5rem 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .details-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255, 255, 255, 0.35);
    }

    .info-description {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 0.3rem;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.8rem;
      padding: 1.5rem;
    }

    .category-tile {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 16px;
      padding: 1.1rem;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.22s ease;
    }
    .category-tile:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(168, 85, 247, 0.3);
      transform: translateY(-2px);
    }

    .tile-icon {
      width: 36px;
      height: 36px;
      background: rgba(168, 85, 247, 0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #c084fc;
    }

    .tile-text {
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffffff;
    }

    .tile-sub {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.35);
    }

    .private-footer {
      padding: 1.1rem;
      background: rgba(0, 0, 0, 0.2);
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.35);
    }

    /* MODAL INFRASTRUCTURE */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-container {
      max-width: 400px;
      border-radius: 20px;
      transform: scale(0.95);
      transition: transform 0.25s ease;
    }

    .modal-overlay.active .modal-container {
      transform: scale(1);
    }

    .modal-header {
      padding: 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h3 {
      font-size: 1.05rem;
      color: #ffffff;
    }

    .close-modal {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 1.1rem;
      cursor: pointer;
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      padding: 1.2rem;
      max-height: 55vh;
      overflow-y: auto;
    }

    .card-wrapper {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .option-card {
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      padding: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .card-main-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .card-icon {
      font-size: 1rem;
      color: #c084fc;
    }

    .card-title {
      font-weight: 600;
      font-size: 0.88rem;
      color: #ffffff;
    }

    .card-desc {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .card-action {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      color: #ffffff;
      font-weight: 500;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card-action:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .sub-versions-container {
      display: none;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0.5rem 0 0.5rem 1.2rem;
      border-left: 2px solid rgba(168, 85, 247, 0.3);
      margin-top: 0.4rem;
      margin-bottom: 0.4rem;
    }

    .toggle-arrow {
      transition: transform 0.2s ease;
      color: rgba(255, 255, 255, 0.4);
    }

    .toast-alert {
      position: fixed;
      bottom: 2.5rem;
      left: 50%;
      transform: translate(-50%, 10px);
      background: rgba(10, 15, 30, 0.95);
      border: 1px solid rgba(168, 85, 247, 0.4);
      padding: 0.6rem 1.5rem;
      border-radius: 20px;
      color: #ffffff;
      font-size: 0.8rem;
      z-index: 2000;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }
    .toast-alert.show {
      transform: translate(-50%, 0);
      opacity: 1;
    }
  </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<form id="loginForm" class="glass-panel login-card">
  <div class="banner-section">
    <img src="/Images/Banner.jpg" alt="banner">
    <div class="banner-overlay"></div>
  </div>

  <div class="profile-node-container">
    <div class="avatar-node-wrapper">
      <img src="/Images/pfp.jpg" alt="profile-picture">
      <span class="live-status-dot"></span>
    </div>
    <h3 class="node-operator-name">Reymark Delagao</h3>
    <p class="node-meta-status">Secure Access Node</p>
    
    <div class="input-wrapper-block">
      <div class="input-group">
        <i class="fas fa-user-astronaut"></i>
        <input type="text" id="usernameInput" placeholder="Username" required autocomplete="username">
      </div>
      
      <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="passwordInput" placeholder="Password" required autocomplete="current-password">
        <i class="fas fa-eye-slash toggle-password" id="togglePassIcon"></i>
      </div>
    </div>
    
    <div class="action-gate-block">
      <button type="submit" class="continue-btn">
        <span>Access Gateway</span> 
        <i class="fas fa-arrow-right-to-bracket"></i>
      </button>

      <button type="button" id="visitorBtn" class="visitor-btn">
        <span>View Portfolio</span> 
        <i class="fas fa-eye"></i>
      </button>
    </div>
    
    <div id="errorMsg" class="error-message" style="display: none;"></div>
    <div class="demo-hint"><i class="fas fa-shield-halved"></i> Secure Vault Gateway</div>
  </div>
</form>

<div id="mainApp" class="glass-panel private-hub">
  <div class="glass-navbar">
    <div class="logo-gnoks"><h2><i class="fas fa-gem"></i> Gnoks · Informations </h2></div>
    <div class="user-area">
      <span class="user-name"><span id="displayUsername">Gnokz</span></span>
      <button type="button" class="logout-btn" id="logoutBtn">Lock</button>
    </div>
  </div>

  <div class="gnoks-header">
    <h1>Gnoks</h1>
  </div>
  
  <div class="details-section">
    <h3>Details</h3>
    <div class="info-description"><i class="fas fa-database"></i> All important info ko ay nandito</div>
  </div>

  <div class="category-grid" id="categoryGrid"></div>
  
  <div class="private-footer">
    <p><i class="fas fa-crown"></i> Private Web - Owner access only</p>
  </div>
</div>

<div id="modalOverlay" class="modal-overlay">
  <div class="glass-panel modal-container">
    <div class="modal-header">
      <h3 id="modalTitle">Category</h3>
      <button type="button" class="close-modal" id="closeModalBtn"><i class="fas fa-times"></i></button>
    </div>
    <div id="modalCardsContainer" class="cards-grid"></div>
  </div>
</div>

<div id="toastAlert" class="toast-alert"></div>

<script>
  (function(){
    const loginForm = document.getElementById('loginForm');
    const mainApp = document.getElementById('mainApp');
    const visitorBtn = document.getElementById('visitorBtn');
    
    const usernameField = document.getElementById('usernameInput');

    const errorMsgDiv = document.getElementById('errorMsg');

    const logoutBtn = document.getElementById('logoutBtn');
    const displayUsernameSpan = document.getElementById('displayUsername');

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalCardsContainer = document.getElementById('modalCardsContainer');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const toastAlert = document.getElementById('toastAlert');

          { title: 'Slide Packs', desc: 'Seamless directional sliding tiles', actionLabel: 'GET', icon: 'fa-arrows-left-right', url: 'https://drive.google.com/file/d/1C12f02oHWlq1mCPgml-kdLkV8mBS9ua4/view?usp=drivesdk' },
          { title: 'Watermark', desc: 'Signature brand safety configurations', actionLabel: 'GET', icon: 'fa-copyright', url: 'https://drive.google.com/file/d/1EAXN-VA2Y8bJNCskdS4LdYQO8TYybCWK/view?usp=drivesdk' },
          { 
            title: 'Color Correction Effects', 
            desc: 'Tap to view 2 versions', 
            icon: 'fa-droplet',

    function showToast(msg) {
      toastAlert.innerText = msg;
      toastAlert.classList.add('show');
      setTimeout(() => toastAlert.classList.remove('show'), 1800);
    }

    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

      e.preventDefault();
      const user = usernameField.value.trim();
      const pass = passwordField.value;
      const hashedInput = await sha256(pass);

      if(user === 'Gnokz' && hashedInput === '4e43018e9d9c90ee405008cb83cd63f3efd6d6c8c6f06121a80bff5a2b4069bd'){
        errorMsgDiv.style.display = 'none';
        displayUsernameSpan.innerText = user;
        loginForm.style.display = 'none';
        mainApp.style.display = 'block';
        usernameField.value = '';
        passwordField.value = '';
      } else {

    function buildCategories(){

      ];
      
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = '';
      
      categoriesList.forEach(cat => {
        const tile = document.createElement('div');
        tile.className = `category-tile`;
        
        tile.addEventListener('click', () => {
          openModal(cat.id);
        });

        tile.innerHTML = `
          <div class="tile-icon"><i class="fas ${cat.icon}"></i></div>
          <div>
            <div class="tile-text">${cat.label}</div>
            <div class="tile-sub">${cat.sub}</div>
          </div>
        `;
        grid.appendChild(tile);
      });
    }

    function openModal(id) {
      const data = categoriesData[id];
      if(!data) return;
      modalTitle.innerHTML = `<i class="fas ${data.icon}"></i> ${data.name}`;
      modalCardsContainer.innerHTML = '';
      
      data.cards.forEach(card => {
        const cardWrapper = document.createElement('div');
        cardWrapper.className = 'card-wrapper';

        const cardEl = document.createElement('div');
        cardEl.className = 'option-card';
        
        if (card.versions) {
          cardEl.style.cursor = 'pointer';
          cardEl.innerHTML = `
            <div class="card-main-info">
              <div class="card-icon"><i class="fas ${card.icon}"></i></div>
              <div>
                <div class="card-title">${card.title}</div>
                <div class="card-desc">${card.desc}</div>
              </div>
            </div>
            <div style="padding-right: 0.2rem;"><i class="fas fa-chevron-down toggle-arrow"></i></div>
          `;

          const subContainer = document.createElement('div');
          subContainer.className = 'sub-versions-container';

          card.versions.forEach(ver => {
            const verEl = document.createElement('div');
            verEl.className = 'option-card';
            verEl.style.background = 'rgba(255, 255, 255, 0.01)';
            verEl.innerHTML = `
              <div class="card-main-info">
                <div class="card-icon" style="font-size: 0.75rem; opacity: 0.7;"><i class="fas fa-circle-dot"></i></div>
                <div>
                  <div class="card-title" style="font-size: 0.75rem;">${ver.title}</div>
                  <div class="card-desc" style="font-size: 0.65rem;">${ver.desc}</div>
                </div>
              </div>
              <button class="card-action">GET</button>
            `;

            verEl.querySelector('.card-action').addEventListener('click', (e) => {
              e.stopPropagation();
              if (ver.url && !ver.url.includes('ILAGAY_ANG_DIRECT_LINK_DITO')) {
                showToast(`Downloading: ${ver.title}...`);
                window.open(ver.url, '_blank');
              } else {
                showToast(`Wala pang link ang ${ver.title}`);
              }
            });

            subContainer.appendChild(verEl);
          });

          cardEl.addEventListener('click', () => {
            const isHidden = subContainer.style.display !== 'flex';
            subContainer.style.display = isHidden ? 'flex' : 'none';
            cardEl.querySelector('.toggle-arrow').style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
          });

          cardWrapper.appendChild(cardEl);
          cardWrapper.appendChild(subContainer);
          modalCardsContainer.appendChild(cardWrapper);

        } else {
          cardEl.innerHTML = `
            <div class="card-main-info">
              <div class="card-icon"><i class="fas ${card.icon}"></i></div>
              <div>
                <div class="card-title">${card.title}</div>
                <div class="card-desc">${card.desc}</div>
              </div>
            </div>
            <button class="card-action">${card.actionLabel || 'GET'}</button>
          `;
          
          cardEl.querySelector('.card-action').addEventListener('click', () => {
            if (id === 'presets') {
              if (card.url && !card.url.includes('ILAGAY_ANG_DIRECT_LINK_DITO')) {
                showToast(`Downloading: ${card.title}...`);
                window.open(card.url, '_blank');
              } else {
                showToast(`Wala pang link ang ${card.title}`);
              }
            } else if (id === 'research' || id === 'prompts') {
              fetch(card.filePath)
                .then(response => {
                  if (!response.ok) throw new Error('File not found');
                  return response.text();
                })
                .then(text => {
                  navigator.clipboard.writeText(text).then(() => {
                    showToast(`Copied prompt for ${card.title}!`);
                  }).catch(() => {
                    showToast('Failed to copy prompt.');
                  });
                })
                .catch(err => {
                  showToast(`Error: Hindi mahanap ang file.`);
                  console.error(err);
                });
            } else {
              showToast(`Triggered: ${card.title}`);
            }
          });
          modalCardsContainer.appendChild(cardEl);
        }
      });
      modalOverlay.classList.add('active');
    }
